{# LLM Wiki Local — login template #}
{% extends "base.html" %}
{% block title %}Login — LLM Wiki Local{% endblock %}

{% block body %}
  <header class="topbar">
    <div class="brand">LLM Wiki Local</div>
    <nav>
      <span class="hint">local admin only</span>
    </nav>
  </header>
  <div class="login-wrap">
    <div class="login-card">
      <h1>로그인</h1>
      <p class="hint">관리자 비밀번호로 로그인합니다.</p>
      <form method="post" action="{{ url_for('login') }}">
        <label for="password">Password / Token</label>
        <input id="password" class="input" type="password" name="password" autocomplete="current-password" required autofocus />
        {% if error %}
          <div class="login-error">{{ error }}</div>
        {% endif %}
        <button class="btn primary" type="submit">로그인</button>
      </form>
    </div>
  </div>
{% endblock %}
