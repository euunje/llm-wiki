{% extends "base.html" %}

{% block title %}질문 — LLM-Wiki{% endblock %}

{% block extra_head %}
<style>
    .markdown-body { line-height: 1.65; }
    .markdown-body h1, .markdown-body h2, .markdown-body h3 {
        font-weight: 600;
        margin-top: 1.2em;
        margin-bottom: 0.5em;
        color: #111827;
    }
    .markdown-body h1 { font-size: 1.5em; }
    .markdown-body h2 { font-size: 1.25em; }
    .markdown-body h3 { font-size: 1.1em; }
    .markdown-body p { margin: 0.6em 0; }
    .markdown-body ul, .markdown-body ol { margin: 0.6em 0; padding-left: 1.5em; }
    .markdown-body li { margin: 0.3em 0; }
    .markdown-body code {
        background: #f1f5f9;
        padding: 0.15em 0.4em;
        border-radius: 3px;
        font-size: 0.9em;
        color: #4f46e5;
    }
    .markdown-body strong { color: #111827; font-weight: 600; }
    .markdown-body a, .markdown-body .wikilink {
        color: #4f46e5;
        text-decoration: none;
    }
    .markdown-body a:hover { text-decoration: underline; }
    .stream-cursor::after {
        content: '▌';
        color: #4f46e5;
        animation: blink 1s steps(1) infinite;
    }
    @keyframes blink {
        50% { opacity: 0; }
    }
    /* Loading spinner — pulsing dots */
    .loading-dots {
        display: inline-flex;
        gap: 4px;
        align-items: center;
    }
    .loading-dots span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #4f46e5;
        animation: pulse-dot 1.4s ease-in-out infinite both;
    }
    .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
    .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes pulse-dot {
        0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
        40% { transform: scale(1); opacity: 1; }
    }
    /* Pipeline stage indicator */
    .stage-indicator {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        background: #f1f5f9;
        border: 1px solid #e2e8f0;
        border-radius: 6px;
        font-size: 13px;
        color: #475569;
    }
    .stage-indicator.active {
        border-color: #4f46e5;
        color: #111827;
    }
    .stage-icon {
        width: 18px;
        height: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }
    .elapsed-counter {
        font-size: 11px;
        color: #64748b;
        margin-left: auto;
        font-variant-numeric: tabular-nums;
    }
</style>
{% endblock %}

{% block content %}

<div class="mb-6">
    <h1 class="text-3xl font-semibold text-[#111827] mb-1">질문</h1>
    <p class="text-sm text-[#475569]">질문을 해보세요. 위키가 스스로 검색하여 인용된 답변을 생성합니다.</p>
</div>

<!-- Chat history -->
<div id="chat-history" class="space-y-6 mb-6">
    <!-- Messages get appended here as users ask questions -->
</div>

<!-- Example queries (shown until first query) -->
<div id="example-queries" class="bg-white border border-[#e2e8f0] rounded-lg p-6 mb-6">
    <div class="text-xs text-[#64748b] uppercase tracking-wide mb-3">시도해볼 수 있는 예시 질문</div>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
        <button class="example-btn text-left text-sm px-3 py-2 bg-[#f1f5f9] hover:bg-[#eef2ff] border border-[#e2e8f0] hover:border-[#4f46e5] rounded text-[#475569] hover:text-[#111827] transition">
            제 위키의 주요 주제는 무엇인가요?
        </button>
        <button class="example-btn text-left text-sm px-3 py-2 bg-[#f1f5f9] hover:bg-[#eef2ff] border border-[#e2e8f0] hover:border-[#4f46e5] rounded text-[#475569] hover:text-[#111827] transition">
            언급된 주요 인물은 누구인가요?
        </button>
        <button class="example-btn text-left text-sm px-3 py-2 bg-[#f1f5f9] hover:bg-[#eef2ff] border border-[#e2e8f0] hover:border-[#4f46e5] rounded text-[#475569] hover:text-[#111827] transition">
            가장 많이 참조되는 개념은 무엇인가요?
        </button>
        <button class="example-btn text-left text-sm px-3 py-2 bg-[#f1f5f9] hover:bg-[#eef2ff] border border-[#e2e8f0] hover:border-[#4f46e5] rounded text-[#475569] hover:text-[#111827] transition">
            여러 소스에 걸친 주요 논거를 요약해주세요.
        </button>
    </div>
</div>

<!-- Input form (sticky to bottom of content area) -->
<form id="query-form" class="bg-white border border-[#e2e8f0] rounded-lg p-2 flex items-center gap-2">
    <input type="text"
           id="query-input"
           name="q"
           placeholder="질문을 입력하세요…"
           autocomplete="off"
           class="flex-1 bg-transparent px-3 py-2 text-[#111827] placeholder-[#64748b] focus:outline-none">
    <button type="submit"
            id="query-submit"
            class="px-4 py-2 bg-[#4f46e5] hover:bg-[#4338ca] text-white rounded-md font-medium transition disabled:opacity-50 disabled:cursor-not-allowed">
        질문
    </button>
</form>

<script>
(function() {
    const form = document.getElementById('query-form');
    const input = document.getElementById('query-input');
    const submitBtn = document.getElementById('query-submit');
    const history = document.getElementById('chat-history');
    const examples = document.getElementById('example-queries');

    // Wire example buttons
    document.querySelectorAll('.example-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            input.value = btn.textContent.trim();
            form.dispatchEvent(new Event('submit'));
        });
    });

    // Naive markdown → HTML for streaming output. Handles wikilinks, bold,
    // headers, code, lists. Not a full parser — good enough for model output.
    function renderMarkdown(text) {
        // Escape HTML
        let html = text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
        // Wikilinks [[foo/bar]] → highlighted span
        html = html.replace(/\[\[([^\]]+?)\]\]/g, '<span class="wikilink">[[$1]]</span>');
        // Headers
        html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
        html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
        html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
        // Bold
        html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        // Italic (very loose)
        html = html.replace(/(?<![*])\*([^*\n]+)\*(?![*])/g, '<em>$1</em>');
        // Inline code
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        // Lists (simple)
        html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
        html = html.replace(/(<li>.*<\/li>\n?)+/g, m => '<ul>' + m + '</ul>');
        // Numbered lists
        html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
        // Paragraphs
        html = html.split(/\n\n+/).map(block => {
            if (block.trim().startsWith('<') || !block.trim()) return block;
            return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
        }).join('\n');
        return html;
    }

    function addUserMessage(question) {
        const div = document.createElement('div');
        div.className = 'flex justify-end';
        div.innerHTML = `
            <div class="max-w-2xl bg-[#eef2ff] border border-[#4f46e5]/40 rounded-lg px-4 py-3">
                <div class="text-xs text-[#4f46e5] uppercase tracking-wide mb-1">질문</div>
                <div class="text-sm text-[#111827]">${question.replace(/</g, '&lt;')}</div>
            </div>
        `;
        history.appendChild(div);
        return div;
    }

    function addAssistantMessage() {
        const div = document.createElement('div');
        div.className = 'bg-white border border-[#e2e8f0] rounded-lg p-5';
        div.innerHTML = `
            <div class="text-xs text-[#475569] uppercase tracking-wide mb-3 flex items-center gap-2">
                <span>위키</span>
            </div>
            <div class="stage-indicator active mb-4">
                <span class="stage-icon">
                    <span class="loading-dots"><span></span><span></span><span></span></span>
                </span>
                <span class="status-line">연결 중…</span>
                <span class="elapsed-counter">0.0s</span>
            </div>
            <div class="hits-container hidden mb-4"></div>
            <div class="answer-container markdown-body text-sm text-[#111827]"></div>
            <div class="actions-container hidden mt-4 pt-4 border-t border-[#e2e8f0] flex items-center gap-2"></div>
        `;
        history.appendChild(div);
        return div;
    }

    function renderHits(container, hits) {
        if (!hits.length) {
            container.innerHTML = '<div class="text-xs text-[#64748b]">일치하는 페이지가 없습니다.</div>';
            container.classList.remove('hidden');
            return;
        }
        const itemsHtml = hits.map((h, i) => `
            <div class="flex items-start gap-3 p-2 rounded hover:bg-[#f1f5f9] transition">
                <div class="text-xs font-mono text-[#64748b] w-8">${i + 1}.</div>
                <div class="text-xs font-mono text-[#4f46e5] w-12">${(h.score * 100).toFixed(0)}%</div>
                <div class="text-xs text-[#111827] truncate">${h.title}</div>
                <div class="text-xs text-[#64748b] truncate ml-auto font-mono">${h.path}</div>
            </div>
        `).join('');
        container.innerHTML = `
            <div class="text-xs text-[#64748b] uppercase tracking-wide mb-2">${hits.length}개 관련 페이지</div>
            ${itemsHtml}
        `;
        container.classList.remove('hidden');
    }

    function showSaveButton(actionsContainer, question, answer) {
        actionsContainer.innerHTML = `
            <input type="text" class="save-slug bg-[#f1f5f9] border border-[#e2e8f0] rounded px-3 py-1.5 text-sm text-[#111827] placeholder-[#64748b] focus:outline-none focus:border-[#4f46e5]" placeholder="종합-슬러그">
            <button class="save-btn px-3 py-1.5 bg-white border border-[#4f46e5] text-[#4f46e5] hover:bg-[#4f46e5] hover:text-white rounded text-sm font-medium transition">
                종합 페이지로 저장
            </button>
            <span class="save-status text-xs text-[#64748b] ml-2"></span>
        `;
        actionsContainer.classList.remove('hidden');

        const saveBtn = actionsContainer.querySelector('.save-btn');
        const slugInput = actionsContainer.querySelector('.save-slug');
        const statusEl = actionsContainer.querySelector('.save-status');

        saveBtn.addEventListener('click', async () => {
            const slug = slugInput.value.trim();
            if (!slug) {
                statusEl.textContent = '먼저 슬러그를 입력하세요';
                statusEl.className = 'save-status text-xs text-yellow-500 ml-2';
                return;
            }
            saveBtn.disabled = true;
            statusEl.textContent = '저장 중…';
            statusEl.className = 'save-status text-xs text-[#475569] ml-2';

            const fd = new FormData();
            fd.append('question', question);
            fd.append('answer', answer);
            fd.append('slug', slug);

            try {
                const r = await fetch('/query/save', { method: 'POST', body: fd });
                const data = await r.json();
                if (data.ok) {
                    statusEl.textContent = '✓ 저장됨 as ' + data.saved_path;
                    statusEl.className = 'save-status text-xs text-green-600 ml-2';
                    saveBtn.textContent = '저장됨';
                } else {
                    statusEl.textContent = '✗ ' + (data.error || 'failed');
                    statusEl.className = 'save-status text-xs text-red-600 ml-2';
                    saveBtn.disabled = false;
                }
            } catch (e) {
                statusEl.textContent = '✗ ' + e.message;
                statusEl.className = 'save-status text-xs text-red-600 ml-2';
                saveBtn.disabled = false;
            }
        });
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const question = input.value.trim();
        if (!question) return;
        input.value = '';
        submitBtn.disabled = true;
        if (examples) examples.style.display = 'none';

        addUserMessage(question);
        const assistantEl = addAssistantMessage();
        const statusEl = assistantEl.querySelector('.status-line');
        const stageEl = assistantEl.querySelector('.stage-indicator');
        const elapsedEl = assistantEl.querySelector('.elapsed-counter');
        const hitsEl = assistantEl.querySelector('.hits-container');
        const answerEl = assistantEl.querySelector('.answer-container');
        const actionsEl = assistantEl.querySelector('.actions-container');

        // Tick the elapsed counter every 100ms while the query runs
        const startTime = performance.now();
        const elapsedTimer = setInterval(() => {
            const seconds = (performance.now() - startTime) / 1000;
            elapsedEl.textContent = seconds.toFixed(1) + 's';
        }, 100);

        function stopTimer() {
            clearInterval(elapsedTimer);
            const finalSeconds = ((performance.now() - startTime) / 1000).toFixed(1);
            elapsedEl.textContent = finalSeconds + 's total';
        }

        let accumulatedAnswer = '';
        let firstChunkReceived = false;

        // Stream via EventSource
        const url = '/query/stream?q=' + encodeURIComponent(question);
        const es = new EventSource(url);

        es.addEventListener('status', (ev) => {
            const data = JSON.parse(ev.data);
            statusEl.textContent = data.text || '';
        });

        es.addEventListener('hits', (ev) => {
            const data = JSON.parse(ev.data);
            renderHits(hitsEl, data.hits);
            statusEl.textContent = '모델이 답변을 종합 중…';
        });

        es.addEventListener('chunk', (ev) => {
            const data = JSON.parse(ev.data);
            if (!firstChunkReceived) {
                firstChunkReceived = true;
                statusEl.textContent = '스트리밍 중…';
            }
            accumulatedAnswer += data.text || '';
            answerEl.innerHTML = renderMarkdown(accumulatedAnswer);
            answerEl.classList.add('stream-cursor');
            window.scrollTo(0, document.body.scrollHeight);
        });

        es.addEventListener('complete', (ev) => {
            const data = JSON.parse(ev.data);
            const finalAnswer = data.answer || accumulatedAnswer;
            answerEl.innerHTML = renderMarkdown(finalAnswer);
            answerEl.classList.remove('stream-cursor');
            statusEl.textContent = '✓ 완료';
            // Replace the dots with a static checkmark
            const icon = stageEl.querySelector('.stage-icon');
            if (icon) icon.innerHTML = '<span class="text-green-600">✓</span>';
            stageEl.classList.remove('active');
            stopTimer();
            es.close();
            submitBtn.disabled = false;
            showSaveButton(actionsEl, question, finalAnswer);
        });

        es.addEventListener('error', (ev) => {
            try {
                const data = JSON.parse(ev.data);
                if (data && data.text) {
                    answerEl.innerHTML = '<div class="text-red-500 text-sm">오류: ' + data.text + '</div>';
                    statusEl.textContent = '✗ 실패';
                }
            } catch (e) {
                if (es.readyState === EventSource.CLOSED) {
                    if (!accumulatedAnswer) {
                        answerEl.innerHTML = '<div class="text-red-500 text-sm">연결이 닫혔습니다.</div>';
                    }
                }
            }
            answerEl.classList.remove('stream-cursor');
            const icon = stageEl.querySelector('.stage-icon');
            if (icon) icon.innerHTML = '<span class="text-red-500">✗</span>';
            stageEl.classList.remove('active');
            stopTimer();
            es.close();
            submitBtn.disabled = false;
        });

        es.addEventListener('done', () => {
            answerEl.classList.remove('stream-cursor');
            stopTimer();
            es.close();
            submitBtn.disabled = false;
        });
    });
})();
</script>

{% endblock %}
